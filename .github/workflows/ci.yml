name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_COMMIT: 'b1e15efef6758eaa0beb0a8732cfa66f6a68a81d'

jobs:
  build:
    name: Build and test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: |
          brew install cmake ninja ccache llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure CMake
        run: cmake -B build --preset debug -DENABLE_COVERAGE=ON
        env:
          CC: clang
          CXX: clang++
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Build
        run: cmake --build build

      - name: Run tests and generate coverage
        run: .github/scripts/generate-coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/coverage-report/
            build/coverage-summary.txt
          retention-days: 30

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/
            !build/vcpkg_installed/
          retention-days: 1

  lint:
    name: Lint
    runs-on: macos-26
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          brew install cmake ninja llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build

      - name: Check formatting on changed files
        run: .github/scripts/check-format.sh

      - name: Run clang-tidy on changed files
        run: .github/scripts/run-clang-tidy.sh

  coverage-comment:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Comment coverage summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Code Coverage Report\n\n```\n' + summary + '\n```\n\nDetailed HTML report available in artifacts.'
            });
